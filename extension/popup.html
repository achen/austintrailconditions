<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
      color: #1a1a1a;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.info { background: #e8f4fd; color: #1565c0; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #fce4ec; color: #c62828; }
    .status.warning { background: #fff3e0; color: #e65100; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: #2563eb;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .config {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }
    .config label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .config input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }
    .post-count {
      font-size: 24px;
      font-weight: 700;
      color: #2563eb;
      text-align: center;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <h1>🚴 Trail Conditions Scraper</h1>
  <div id="status" class="status info">Navigate to the Austin Trail Conditions Facebook group, then click Scrape.</div>
  <div id="count" class="post-count" style="display:none"></div>
  <button id="scrapeBtn">Scrape Posts</button>

  <div class="config">
    <label for="apiUrl">API URL</label>
    <input id="apiUrl" type="text" placeholder="https://austintrailconditions.com">
    <label for="apiSecret" style="margin-top:8px">Cron Secret</label>
    <input id="apiSecret" type="password" placeholder="Your CRON_SECRET">
  </div>

  <script src="popup.js"></script>
</body>
</html>
